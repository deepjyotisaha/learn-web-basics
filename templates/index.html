<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Fundamentals Lab</title>
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f1117;color:#e2e8f0;line-height:1.6;overflow-x:hidden}
a{color:#60a5fa;text-decoration:none}

/* ── LAYOUT ───────────────────────────────────────────────── */
.app{display:flex;height:100vh}
.sidebar{width:280px;min-width:280px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;padding:16px 0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar h1{font-size:14px;font-weight:600;color:#8b949e}
.topbar .step-title{font-size:18px;font-weight:700;color:#e2e8f0}
.content-area{flex:1;overflow-y:auto;padding:32px;display:flex;gap:32px}
.learn-panel{flex:1;max-width:600px;min-width:400px}
.demo-panel{flex:1;background:#161b22;border-radius:12px;border:1px solid #30363d;display:flex;flex-direction:column;overflow:hidden}

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar h2{font-size:13px;color:#8b949e;padding:8px 20px;text-transform:uppercase;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:background .15s;font-size:14px;border-left:3px solid transparent}
.nav-item:hover{background:#1c2333}
.nav-item.active{background:#1c2333;border-left-color:#60a5fa;color:#60a5fa}
.nav-item.locked{opacity:.4;cursor:not-allowed}
.nav-item .num{width:24px;height:24px;border-radius:50%;background:#30363d;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.nav-item.active .num{background:#60a5fa;color:#0f1117}
.nav-item.done .num{background:#22c55e;color:#0f1117}

/* ── LEARN PANEL ──────────────────────────────────────────── */
.learn-panel h2{font-size:24px;font-weight:700;margin-bottom:8px}
.learn-panel .subtitle{color:#8b949e;font-size:14px;margin-bottom:24px}
.concept-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;margin-bottom:16px}
.concept-card h3{font-size:16px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.concept-card p,.concept-card ul,.concept-card li{font-size:14px;color:#b0bac5}
.concept-card ul{padding-left:20px;margin-top:8px}
.concept-card li{margin-bottom:6px}
.concept-card code{background:#1e2736;padding:2px 6px;border-radius:4px;font-size:13px;color:#7dd3fc;font-family:'Cascadia Code','Fira Code',monospace}
.concept-card .analogy{background:#1a2332;border-left:3px solid #f59e0b;padding:12px 16px;border-radius:0 8px 8px 0;margin-top:12px;font-size:13px;color:#fbbf24}
.concept-card .analogy strong{color:#f59e0b}
.key-point{background:#0d2847;border:1px solid #1e4976;border-radius:8px;padding:16px;margin-top:12px;font-size:13px;color:#93c5fd}
.key-point strong{color:#60a5fa}

/* table inside concept cards */
.concept-card table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
.concept-card th{text-align:left;padding:8px 10px;background:#1e2736;color:#8b949e;font-weight:600;border-bottom:1px solid #30363d}
.concept-card td{padding:8px 10px;border-bottom:1px solid #1e2736;color:#b0bac5}
.concept-card td code{font-size:12px}

/* ── DEMO PANEL ───────────────────────────────────────────── */
.demo-header{padding:12px 16px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between}
.demo-header h3{font-size:14px;font-weight:600;color:#8b949e}
.demo-body{flex:1;overflow-y:auto;padding:16px}
.demo-body pre{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:16px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word;color:#c9d1d9;overflow-x:auto}
.demo-body .req-line{color:#7ee787}
.demo-body .res-line{color:#79c0ff}
.demo-body .header-line{color:#8b949e}
.demo-body .json-key{color:#ff7b72}
.demo-body .json-val{color:#a5d6ff}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#3b82f6}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#22c55e}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#ef4444}
.btn-outline{background:transparent;border:1px solid #30363d;color:#8b949e}.btn-outline:hover{border-color:#60a5fa;color:#60a5fa}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-group{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* Method badges */
.method-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:monospace}
.method-GET{background:#16a34a22;color:#4ade80;border:1px solid #16a34a55}
.method-POST{background:#2563eb22;color:#60a5fa;border:1px solid #2563eb55}
.method-PUT{background:#d9770622;color:#fb923c;border:1px solid #d9770655}
.method-DELETE{background:#dc262622;color:#f87171;border:1px solid #dc262655}

/* Live editor */
.editor-wrap{border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-top:12px}
.editor-tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d}
.editor-tab{padding:8px 16px;font-size:12px;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent}
.editor-tab.active{color:#e2e8f0;border-bottom-color:#60a5fa}
.editor-textarea{width:100%;min-height:320px;background:#0d1117;color:#c9d1d9;border:none;padding:12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;line-height:1.6;resize:vertical}
.editor-textarea:focus{outline:none}
.preview-frame{width:100%;min-height:350px;background:#fff;border:none;border-radius:0 0 8px 8px}

/* Timeline / flow diagram */
.flow-diagram{display:flex;flex-direction:column;gap:0;margin-top:16px}
.flow-step{display:flex;align-items:flex-start;gap:12px;position:relative;padding-bottom:16px}
.flow-step:not(:last-child)::before{content:'';position:absolute;left:15px;top:32px;bottom:0;width:2px;background:#30363d}
.flow-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;z-index:1}
.flow-dot.blue{background:#1e3a5f;border:2px solid #3b82f6}
.flow-dot.green{background:#14532d;border:2px solid #22c55e}
.flow-dot.orange{background:#431407;border:2px solid #f97316}
.flow-dot.purple{background:#2e1065;border:2px solid #a855f7}
.flow-dot.red{background:#450a0a;border:2px solid #ef4444}
.flow-content{flex:1}
.flow-content h4{font-size:14px;font-weight:600;margin-bottom:2px}
.flow-content p{font-size:13px;color:#8b949e}

/* Tech stack cards */
.tech-row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.tech-card{flex:1;min-width:140px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;text-align:center}
.tech-card .era{font-size:11px;color:#8b949e;margin-bottom:4px}
.tech-card .tech-name{font-size:14px;font-weight:700;margin-bottom:4px}
.tech-card .tech-desc{font-size:12px;color:#8b949e}

/* Response viewer */
.response-viewer{margin-top:12px}
.response-viewer .status{font-size:13px;font-weight:600;margin-bottom:8px}
.response-viewer .status.ok{color:#4ade80}
.response-viewer .status.err{color:#f87171}

/* Step navigation */
.step-nav{display:flex;gap:12px;padding:16px 24px;border-top:1px solid #30363d;background:#161b22;justify-content:space-between}

/* progress bar */
.progress-bar{height:3px;background:#30363d;margin:0}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:width .3s}

/* Architecture diagram */
.arch-diagram{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:20px;margin-top:16px;text-align:center}
.arch-row{display:flex;justify-content:center;gap:16px;margin:8px 0;flex-wrap:wrap}
.arch-box{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;min-width:110px}
.arch-box.browser{background:#1e3a5f;border:1px solid #3b82f6;color:#93c5fd}
.arch-box.server{background:#14532d;border:1px solid #22c55e;color:#86efac}
.arch-box.db{background:#431407;border:1px solid #f97316;color:#fed7aa}
.arch-box.api{background:#2e1065;border:1px solid #a855f7;color:#d8b4fe}
.arch-box.cdn{background:#164e63;border:1px solid #06b6d4;color:#a5f3fc}
.arch-arrow{color:#8b949e;font-size:20px;display:flex;align-items:center}

/* Accordion (Step 2) */
.accordion{background:#0d1117;border:1px solid #30363d;border-radius:10px;overflow:hidden}
.accordion-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;font-size:13px;font-weight:600;color:#e2e8f0;transition:background .15s;user-select:none}
.accordion-header:hover{background:#1c2333}
.accordion-chevron{font-size:10px;color:#8b949e;transition:transform .25s}
.accordion-header.open .accordion-chevron{transform:rotate(180deg)}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;padding:0 16px}
.accordion-body.open{max-height:600px;padding:12px 16px 16px}

/* Language code blocks (Step 7) */
.lang-block{white-space:pre-wrap;word-wrap:break-word;overflow-x:auto;font-family:'Cascadia Code','Fira Code',monospace}

/* ═══ STEP 10: GAME-LIKE FULLSCREEN FLOW ═══ */
.flow-overlay{position:fixed;inset:0;background:#0b0e14;z-index:1000;display:flex;flex-direction:column;opacity:0;transition:opacity .4s;pointer-events:none}
.flow-overlay.visible{opacity:1;pointer-events:all}

/* Top bar */
.gf-topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 24px;border-bottom:1px solid #30363d;background:#0f1117}
.gf-topbar h2{font-size:16px;font-weight:700;color:#e2e8f0}
.gf-step-pills{display:flex;gap:4px}
.gf-pill{width:28px;height:6px;border-radius:3px;background:#30363d;transition:background .3s}
.gf-pill.done{background:#22c55e}
.gf-pill.active{background:#fbbf24}

/* Main stage: two halves */
.gf-stage{flex:1;display:flex;overflow:hidden;position:relative}
.gf-side{flex:37;display:flex;flex-direction:column;padding:20px;overflow-y:auto}
.gf-client{background:#080e1a}
.gf-server{background:#040e08}

/* Side headers */
.gf-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.gf-header-icon{font-size:36px}
.gf-header-title{font-size:18px;font-weight:700}
.gf-header-sub{font-size:11px;color:#8b949e;margin-top:2px}

/* Activity cards inside each side */
.gf-card{border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:12px;opacity:0.1;transition:all .4s;position:relative}
.gf-card.visible{opacity:1}
.gf-card.glow{outline:2px solid #fbbf24;outline-offset:2px}
.gf-card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.gf-card-body{font-size:12px;color:#8b949e;margin-top:6px;line-height:1.6}
.gf-card-code{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;margin-top:8px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;color:#c9d1d9;line-height:1.5;white-space:pre-wrap}

/* Animated arrow that flies across the gap */
.gf-arrow-track{position:absolute;top:0;bottom:0;left:37%;width:0;pointer-events:none;z-index:10}
.gf-arrow{position:absolute;left:-60px;width:120px;text-align:center;opacity:0;transition:all .6s}
.gf-arrow.fly{opacity:1}
.gf-arrow-icon{font-size:36px;font-weight:700;display:block;line-height:1}
.gf-arrow-label{font-size:10px;color:#8b949e;margin-top:2px;white-space:nowrap}
.gf-arrow-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:monospace}
@keyframes arrowPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.gf-arrow.fly .gf-arrow-icon{animation:arrowPulse .8s infinite}

/* Bottom: narration + next button */
.gf-right-panel{flex:26;display:flex;flex-direction:column;background:#111827;border-left:1px solid #30363d;overflow-y:auto}
.gf-narration{flex:1;padding:20px;overflow-y:auto}
.gf-narr-step{font-size:11px;color:#fbbf24;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.gf-narr-title{font-size:16px;font-weight:700;color:#e2e8f0}
.gf-narr-text{font-size:13px;color:#b0bac5;margin-top:6px;line-height:1.6}
.gf-action{padding:16px 20px;border-top:1px solid #30363d}
.gf-next-btn{padding:14px 28px;font-size:15px;font-weight:700;border-radius:10px;border:none;cursor:pointer;transition:all .15s;background:#2563eb;color:#fff}
.gf-next-btn:hover{background:#3b82f6;transform:scale(1.03)}
.gf-next-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.gf-next-btn.green{background:#16a34a}
.gf-next-btn.green:hover{background:#22c55e}
.gf-card-code{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;color:#c9d1d9;line-height:1.5;white-space:pre-wrap}

/* Animated request */
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.loading{animation:pulse 1s infinite}

/* scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0f1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
</style>
</head>
<body>

<div class="app">
  <!-- ── SIDEBAR ──────────────────────────────────────── -->
  <div class="sidebar">
    <h2>Web Fundamentals</h2>
    <div id="nav"></div>
  </div>

  <!-- ── MAIN ─────────────────────────────────────────── -->
  <div class="main">
    <div class="topbar">
      <h1>Web Fundamentals Lab</h1>
      <span style="color:#30363d">|</span>
      <span class="step-title" id="topTitle">Step 1</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11%"></div></div>

    <div class="content-area">
      <div class="learn-panel" id="learnPanel"></div>
      <div class="demo-panel">
        <div class="demo-header">
          <h3>Interactive Demo</h3>
          <span id="demoStatus" style="font-size:12px;color:#8b949e"></span>
        </div>
        <div class="demo-body" id="demoBody">
          <p style="color:#8b949e;text-align:center;margin-top:40px">Select a step to begin</p>
        </div>
      </div>
    </div>

    <div class="step-nav">
      <button class="btn btn-outline" id="prevBtn" onclick="nav(-1)">Previous</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nav(1)">Next Step</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// STEP DATA
// ─────────────────────────────────────────────────────────────
const STEPS = [
  // ── STEP 1: WHAT IS HTTP ──────────────────────────────────
  {
    title: "What is HTTP?",
    icon: "1",
    learn: `
      <h2>Step 1 — What is HTTP?</h2>
      <p class="subtitle">The language computers use to talk to each other over the internet</p>

      <div class="concept-card">
        <h3>The Big Picture</h3>
        <p>HTTP stands for <strong>HyperText Transfer Protocol</strong>. It is a simple set of rules that lets two computers communicate over a network.</p>
        <p style="margin-top:8px">Every time you open a website, your browser (the <strong>client</strong>) sends an HTTP <strong>request</strong> to a computer somewhere (the <strong>server</strong>), and the server sends back an HTTP <strong>response</strong>.</p>
        <div class="analogy"><strong>Analogy:</strong> Think of it like ordering food at a restaurant. You (client) give your order (request) to the waiter (HTTP), who takes it to the kitchen (server). The kitchen prepares your food and the waiter brings it back (response).</div>
      </div>

      <div class="concept-card">
        <h3>What does an HTTP Request look like?</h3>
        <p>Every HTTP request has these parts:</p>
        <ul>
          <li><strong>Method</strong> — what you want to do (GET, POST, etc.)</li>
          <li><strong>URL / Path</strong> — where you want to go (<code>/menu</code>)</li>
          <li><strong>Headers</strong> — metadata (who you are, what format you accept)</li>
          <li><strong>Body</strong> — optional data you're sending (like form data)</li>
        </ul>
      </div>

      <div class="concept-card">
        <h3>What does an HTTP Response look like?</h3>
        <p>The server replies with:</p>
        <ul>
          <li><strong>Status Code</strong> — did it work? (<code>200 OK</code>, <code>404 Not Found</code>, <code>500 Server Error</code>)</li>
          <li><strong>Headers</strong> — metadata about the response</li>
          <li><strong>Body</strong> — the actual content (HTML page, JSON data, image, etc.)</li>
        </ul>
        <div class="key-point"><strong>Key insight:</strong> HTTP is <em>stateless</em> — the server doesn't remember you between requests. Every request is independent. (That's why websites use cookies and sessions to "remember" you.)</div>
      </div>
    `,
    demo: function() {
      return `
        <p style="margin-bottom:16px;color:#8b949e;font-size:13px">This is what happens every time you open a website — two computers talking via HTTP.</p>

        <!-- VISUAL: Two computers communicating -->
        <div style="background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:24px 16px;text-align:center">

          <!-- The two computers -->
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <!-- Client -->
            <div style="text-align:center;width:140px">
              <div style="font-size:48px;line-height:1">&#128187;</div>
              <div style="font-size:14px;font-weight:700;color:#93c5fd;margin-top:4px">Your Browser</div>
              <div style="font-size:11px;color:#8b949e">(Client)</div>
            </div>
            <!-- Spacer -->
            <div style="flex:1"></div>
            <!-- Server -->
            <div style="text-align:center;width:140px">
              <div style="font-size:48px;line-height:1">&#128421;</div>
              <div style="font-size:14px;font-weight:700;color:#86efac;margin-top:4px">Restaurant Server</div>
              <div style="font-size:11px;color:#8b949e">(Server)</div>
            </div>
          </div>

          <!-- Arrow 1: Request -->
          <div id="httpArrow1" style="margin:12px 0;opacity:0;transition:opacity 0.5s">
            <div style="display:flex;align-items:center;gap:8px;justify-content:center">
              <span style="color:#93c5fd;font-size:12px;font-weight:600">CLIENT</span>
              <div style="flex:1;max-width:200px;height:2px;background:linear-gradient(90deg,#3b82f6,#22c55e);position:relative">
                <div style="position:absolute;right:-6px;top:-4px;width:0;height:0;border-left:8px solid #22c55e;border-top:5px solid transparent;border-bottom:5px solid transparent"></div>
              </div>
              <span style="color:#86efac;font-size:12px;font-weight:600">SERVER</span>
            </div>
            <div style="background:#1e3a5f;border:1px solid #3b82f6;border-radius:8px;padding:10px;margin-top:8px;text-align:left">
              <div style="font-size:11px;color:#8b949e;margin-bottom:4px">HTTP REQUEST</div>
              <code style="font-size:13px;color:#7dd3fc">GET /menu HTTP/1.1</code><br>
              <code style="font-size:12px;color:#8b949e">Host: thecurryhouse.com</code>
            </div>
          </div>

          <!-- Arrow 2: Response (right to left) -->
          <div id="httpArrow2" style="margin:12px 0;opacity:0;transition:opacity 0.5s">
            <div style="display:flex;align-items:center;gap:8px;justify-content:center">
              <span style="color:#93c5fd;font-size:12px;font-weight:600">CLIENT</span>
              <div style="flex:1;max-width:200px;height:2px;background:linear-gradient(90deg,#3b82f6,#22c55e);position:relative">
                <div style="position:absolute;left:-6px;top:-4px;width:0;height:0;border-right:8px solid #3b82f6;border-top:5px solid transparent;border-bottom:5px solid transparent"></div>
              </div>
              <span style="color:#86efac;font-size:12px;font-weight:600">SERVER</span>
            </div>
            <div style="background:#14532d;border:1px solid #22c55e;border-radius:8px;padding:10px;margin-top:8px;text-align:left">
              <div style="font-size:11px;color:#8b949e;margin-bottom:4px">HTTP RESPONSE</div>
              <code style="font-size:13px;color:#86efac">200 OK</code><br>
              <code style="font-size:12px;color:#8b949e">Content-Type: application/json</code>
              <pre style="margin:6px 0 0;padding:8px;background:#0d1117;border-radius:6px;font-size:12px;color:#c9d1d9;line-height:1.5">{
  "restaurant": "The Curry House",
  "menu": [
    {"dish": "Paneer Tikka",  "price": 220},
    {"dish": "Masala Dosa",   "price": 120},
    {"dish": "Dal Makhani",   "price": 180},
    {"dish": "Gulab Jamun",   "price": 90}
  ]
}</pre>
            </div>
          </div>

          <!-- Play button -->
          <button class="btn btn-primary" style="margin-top:16px" id="httpPlayBtn" onclick="playHttpAnim()">Play: Watch the Request/Response</button>

          <!-- Summary after animation -->

      <h2>Step 7 — Backend Technologies</h2>
      <p class="subtitle">Everything that runs on the server — the language changes, the concept doesn't</p>

      <div class="concept-card">
        <h3>What is the Backend?</h3>
        <p>The <strong>backend</strong> (or "server side") is the code that runs <em>on the server</em> — a computer somewhere in a data center. It handles:</p>
        <ul>
          <li><strong>Business logic</strong> — calculate prices, apply discounts, process orders</li>
          <li><strong>Data storage</strong> — read/write from a database</li>
          <li><strong>Authentication</strong> — who are you? are you allowed to do this?</li>
          <li><strong>Serving the frontend</strong> — send HTML/CSS/JS files to the browser</li>
          <li><strong>API endpoints</strong> — respond to requests from the frontend</li>
        </ul>
        <div class="analogy"><strong>Analogy:</strong> If the frontend is the restaurant dining room (what customers see), the backend is the kitchen (where the real work happens). Customers never see the kitchen, but that's where food is prepared, orders are tracked, and inventory is managed.</div>
      </div>

      <div class="concept-card">
        <h3>Evolution of Backend Tech</h3>
        <p>The technology changed over the decades, but the <em>job</em> stayed the same: <strong>receive a request, do some work, send a response.</strong></p>
        <div class="tech-row">
          <div class="tech-card">
            <div class="era">1993</div>
            <div class="tech-name">CGI / Perl</div>
            <div class="tech-desc">The very first dynamic web pages. The web server spawns a Perl script for each request. It prints HTML to stdout. Revolutionary — but slow (a new process per request!).</div>
          </div>
          <div class="tech-card">
            <div class="era">1995–2000s</div>
            <div class="tech-name">PHP / ASP</div>
            <div class="tech-desc">Code is embedded directly inside HTML files. The server executes the code and sends the result. WordPress, early Facebook — all PHP. Easy to start, messy at scale.</div>
          </div>

          <div class="tech-card">
            <div class="era">2005+</div>

      <h2>Step 8 — APIs & REST</h2>
      <p class="subtitle">How apps talk to each other</p>

      <div class="concept-card">
        <h3>What is an API?</h3>
        <p><strong>API</strong> (Application Programming Interface) is a contract between two systems. It says: "If you send me <em>this</em> kind of request, I'll give you <em>that</em> kind of response."</p>
        <p style="margin-top:8px">APIs are not just for web pages — they're how <em>all</em> modern software communicates. Your weather app, payment gateway, login with Google — all use APIs.</p>
        <div class="analogy"><strong>Analogy:</strong> An API is like a restaurant menu. It lists what you can order (endpoints), what you need to tell the waiter (parameters), and what you'll get back (response). You don't need to know how the kitchen works — you just follow the menu.</div>
      </div>

let currentStep = 0;
let maxUnlocked = 0; // all unlocked from the start for this tutorial

function renderNav() {
  const navEl = document.getElementById('nav');
  navEl.innerHTML = STEPS.map((s, i) => `
    <div class="nav-item ${i === currentStep ? 'active' : ''} ${i <= maxUnlocked ? '' : ''}"
         onclick="goTo(${i})" style="cursor:pointer">
      <div class="num">${s.icon}</div>
      <span>${s.title}</span>
    </div>
  `).join('');
}

function goTo(i) {
  currentStep = i;
  if (i > maxUnlocked) maxUnlocked = i;
  renderNav();
  renderStep();
}

function nav(dir) {
  let next = currentStep + dir;
  if (next < 0) next = 0;
  if (next >= STEPS.length) next = STEPS.length - 1;
  goTo(next);
}

function renderStep() {
  const s = STEPS[currentStep];
  document.getElementById('topTitle').textContent = `Step ${currentStep + 1} — ${s.title}`;
  document.getElementById('learnPanel').innerHTML = s.learn;
  document.getElementById('demoBody').innerHTML = s.demo();
  document.getElementById('progressFill').style.width = ((currentStep + 1) / STEPS.length * 100) + '%';
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('nextBtn').textContent = currentStep === STEPS.length - 1 ? 'Finish' : 'Next Step';
  if (s.afterRender) setTimeout(s.afterRender, 50);
}

function playHttpAnim() {
  const btn = document.getElementById('httpPlayBtn');
  const arrow1 = document.getElementById('httpArrow1');
  const arrow2 = document.getElementById('httpArrow2');
  const summary = document.getElementById('httpSummary');

  // reset
  arrow1.style.opacity = '0';
  arrow2.style.opacity = '0';
  summary.style.opacity = '0';
  btn.textContent = 'Sending request...';
  btn.disabled = true;

  // Step 1: show request arrow
  setTimeout(() => { arrow1.style.opacity = '1'; btn.textContent = 'Server processing...'; }, 600);
  // Step 2: show response arrow
  setTimeout(() => { arrow2.style.opacity = '1'; btn.textContent = 'Response received!'; }, 2000);
  // Step 3: show summary
  setTimeout(() => {
    summary.style.opacity = '1';
    btn.textContent = 'Replay';
    btn.disabled = false;
  }, 3000);
}

function toggleAccordion(header) {
  const body = header.nextElementSibling;
  const isOpen = header.classList.contains('open');
  // close all siblings first
  header.closest('.demo-body').querySelectorAll('.accordion-header.open').forEach(h => {
    h.classList.remove('open');
    h.nextElementSibling.classList.remove('open');
  });
  if (!isOpen) {
    header.classList.add('open');
    body.classList.add('open');
  }
}

async function apiCall(method, url) {
  const el = document.getElementById('apiResult');
  el.innerHTML = `<p class="loading" style="color:#60a5fa">Sending ${method} ${url}...</p>`;
  try {
    const res = await fetch(url, { method });

    const color = res.ok ? '#4ade80' : '#f87171';
    el.innerHTML = `
      <div style="margin-bottom:4px"><span class="method-badge method-${method}">${method}</span> <code>${url}</code> &rarr; <span style="color:${color};font-weight:600">${res.status} ${res.ok?'OK':'Not Found'}</span></div>

    `;
  } catch (e) {
    el.innerHTML = `<p style="color:#f87171">Error: ${e.message}</p>`;
  }
}

let shopLogEntries = [];
async function shopAction(action, id) {
  let method, url, body, label;
  switch(action) {
    case 'browse':
      method='GET'; url='/api/products'; label='Browse products'; break;
    case 'add':
      method='POST'; url='/api/cart'; body={product_id:id,qty:1}; label='Add to cart'; break;
    case 'cart':
      method='GET'; url='/api/cart'; label='View cart'; break;
    case 'clear':
      method='DELETE'; url='/api/cart'; label='Clear cart'; break;
    case 'checkout':
      method='POST'; url='/api/checkout'; label='Checkout'; break;
  }

  const opts = { method };
  if (body) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(body); }

  try {
    const res = await fetch(url, opts);
    const data = await res.json();
    const color = res.ok ? '#4ade80' : '#f87171';
    const entry = `
      <div style="border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:8px;background:#0d1117">
        <div style="margin-bottom:4px;font-size:13px"><span class="method-badge method-${method}">${method}</span> <code>${url}</code> &rarr; <span style="color:${color};font-weight:600">${res.status}</span> <span style="color:#8b949e;font-size:11px">${label}</span></div>
        <pre style="margin:0;font-size:12px">${syntaxHighlight(data)}</pre>
      </div>`;
    shopLogEntries.unshift(entry);
    document.getElementById('shopLog').innerHTML = shopLogEntries.join('');
  } catch (e) {
    document.getElementById('shopLog').innerHTML = `<p style="color:#f87171">Error: ${e.message}</p>` + document.getElementById('shopLog').innerHTML;
  }
}

function gfAdvance() {
  // Mark previous pill as done
  if (gfCurrent >= 0) {
    const pp = document.getElementById('gfPill'+gfCurrent);
    if (pp) { pp.classList.remove('active'); pp.classList.add('done'); }
    // Remove glow from previous card
    const prev = GF_STEPS[gfCurrent];
    if (prev.card) document.getElementById(prev.card)?.classList.remove('glow');
  }

  gfCurrent++;

  // End?
  if (gfCurrent >= GF_STEPS.length) {
    document.getElementById('gfNStep').textContent = 'COMPLETE';
    document.getElementById('gfNTitle').textContent = 'The full round-trip is done!';
    document.getElementById('gfNText').innerHTML = 'From click to database and back — <strong>that\'s how every web app works</strong>. The browser never reloaded. All 10 steps you learned made this possible.';
    document.getElementById('gfNCode').style.display = 'none';
    const nb = document.getElementById('gfNextBtn');
    nb.textContent = 'Replay';
    nb.className = 'gf-next-btn green';
    nb.onclick = function() { gfResetAll(); nb.onclick = gfAdvance; };
    return;
  }

  const s = GF_STEPS[gfCurrent];

  // Pill
  const pill = document.getElementById('gfPill'+gfCurrent);
  if (pill) pill.classList.add('active');

  // Show & glow card
  if (s.card) {
    const card = document.getElementById(s.card);
    card.classList.add('visible','glow');
  }

  // Arrows — based on which step we're on
  // Step 1: GET request arrow flies right
  if (gfCurrent === 1) document.getElementById('gfArrowGet')?.classList.add('fly');
  // Step 2: HTML response arrow flies left
  if (gfCurrent === 2) document.getElementById('gfArrowHtml')?.classList.add('fly');
  // Step 5: POST request arrow flies right
  if (gfCurrent === 5) document.getElementById('gfArrowReq')?.classList.add('fly');
  // Step 9: JSON response arrow flies left
  if (gfCurrent === 9) document.getElementById('gfArrowRes')?.classList.add('fly');

  // Side effects: make things feel alive
  if (gfCurrent === 4) {
    // Button changes to "clicked"
    const btn = document.getElementById('gcBtn');
    if (btn) { btn.textContent = 'Clicked!'; btn.style.background = '#f59e0b'; }
  }
  if (gfCurrent === 7) {
    // Animate server checks
    const checks = document.getElementById('gsChecks');
    if (checks) checks.innerHTML = '<div style="color:#4ade80">&#9745; Found: Wireless Mouse</div><div style="color:#4ade80">&#9745; In stock (34 available)</div><div style="color:#4ade80">&#9745; Price: Rs. 599 x 1 = Rs. 599</div>';
  }
  if (gfCurrent === 8) {
    const db = document.getElementById('gsDbStatus');
    if (db) { db.textContent = 'Saved!'; db.style.color = '#4ade80'; }
  }
  if (gfCurrent === 11) {
    // DOM modification — show the before/after
    const dn1 = document.getElementById('gcDomNew1'); if (dn1) dn1.textContent = '1 item';
    const dn2 = document.getElementById('gcDomNew2'); if (dn2) dn2.textContent = 'Rs. 599';
    const dn3 = document.getElementById('gcDomNew3'); if (dn3) dn3.textContent = 'Added!';
    // Also update the rendered button above
    const btn = document.getElementById('gcBtn');
    if (btn) { btn.textContent = 'Added!'; btn.style.background = '#16a34a'; }
  }

  // Narration
  const zoneLabels = {client:'BROWSER', server:'SERVER', 'network-req':'NETWORK', 'network-res':'NETWORK'};
  document.getElementById('gfNStep').textContent = 'Step ' + (gfCurrent+1) + ' of ' + GF_STEPS.length + '  ·  ' + zoneLabels[s.side];
  document.getElementById('gfNTitle').textContent = s.title;
  document.getElementById('gfNText').textContent = s.text;
  const codeEl = document.getElementById('gfNCode');
  if (s.code) { codeEl.textContent = s.code; codeEl.style.display = ''; }
  else { codeEl.style.display = 'none'; }

  // Next button text
  const nb = document.getElementById('gfNextBtn');
  if (gfCurrent < GF_STEPS.length - 1) {
    nb.textContent = (GF_STEPS[gfCurrent].btn || 'Next Step') + ' \u27A2';
  } else {
    nb.textContent = 'Finish';
  }
}

// ─────────────────────────────────────────────────────────────
// JSON SYNTAX HIGHLIGHTER
// ─────────────────────────────────────────────────────────────
function syntaxHighlight(obj) {
  let json = JSON.stringify(obj, null, 2);
  json = json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return json.replace(/"([^"]+)":/g, '<span style="color:#ff7b72">"$1"</span>:')
             .replace(/: "([^"]*)"/g, ': <span style="color:#a5d6ff">"$1"</span>')
             .replace(/: (\d+)/g, ': <span style="color:#79c0ff">$1</span>')
             .replace(/: (true|false|null)/g, ': <span style="color:#f59e0b">$1</span>');
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
maxUnlocked = STEPS.length - 1; // all steps unlocked
renderNav();
renderStep();
